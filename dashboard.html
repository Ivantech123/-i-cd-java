<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub CI/CD Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            color: #7f8c8d;
            font-size: 1.2em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .stat-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #7f8c8d;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .success { color: #27ae60; }
        .failed { color: #e74c3c; }
        .building { color: #f39c12; }
        .total { color: #3498db; }
        
        .builds-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.8em;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .build-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #f8f9fa;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        
        .build-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .build-item.success { border-left-color: #27ae60; }
        .build-item.failed { border-left-color: #e74c3c; }
        .build-item.building { border-left-color: #f39c12; }
        
        .build-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
            animation: pulse 2s infinite;
        }
        
        .build-status.success { background: #27ae60; }
        .build-status.failed { background: #e74c3c; }
        .build-status.building { background: #f39c12; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .build-info {
            flex: 1;
        }
        
        .build-repo {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1em;
        }
        
        .build-details {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .build-time {
            color: #95a5a6;
            font-size: 0.8em;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
        }
        
        .footer a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 GitHub CI/CD Monitor</h1>
            <p>Автоматическая сборка и развертывание проектов</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number total" id="totalBuilds">0</div>
                <div class="stat-label">Всего сборок</div>
            </div>
            <div class="stat-card">
                <div class="stat-number success" id="successBuilds">0</div>
                <div class="stat-label">Успешных</div>
            </div>
            <div class="stat-card">
                <div class="stat-number failed" id="failedBuilds">0</div>
                <div class="stat-label">Неудачных</div>
            </div>
            <div class="stat-card">
                <div class="stat-number building" id="buildingBuilds">0</div>
                <div class="stat-label">В процессе</div>
            </div>
        </div>
        
        <div class="builds-section">
            <div class="section-title">📋 Последние сборки</div>
            
            <div class="controls">
                <button class="btn btn-primary" onclick="refreshBuilds()">🔄 Обновить</button>
                <button class="btn btn-success" onclick="triggerBuild()">▶️ Запустить сборку</button>
            </div>
            
            <div id="buildsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка данных о сборках...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>
            Powered by <a href="https://github.com" target="_blank">GitHub</a> + 
            <a href="https://www.docker.com" target="_blank">Docker</a> + 
            <a href="https://python.org" target="_blank">Python</a>
        </p>
    </div>

    <script>
        class CICDDashboard {
            constructor() {
                this.apiBaseUrl = '/api';
                this.refreshInterval = 30000; // 30 секунд
                this.init();
            }
            
            init() {
                this.loadBuilds();
                this.startAutoRefresh();
            }
            
            async loadBuilds() {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/builds`);
                    const builds = await response.json();
                    
                    this.updateStats(builds);
                    this.renderBuilds(builds);
                } catch (error) {
                    console.error('Ошибка загрузки сборок:', error);
                    this.showError('Не удалось загрузить данные о сборках');
                }
            }
            
            updateStats(builds) {
                const stats = {
                    total: Object.keys(builds).length,
                    success: 0,
                    failed: 0,
                    building: 0
                };
                
                Object.values(builds).forEach(build => {
                    if (build.status === 'success') stats.success++;
                    else if (build.status === 'failed') stats.failed++;
                    else if (build.status === 'building') stats.building++;
                });
                
                document.getElementById('totalBuilds').textContent = stats.total;
                document.getElementById('successBuilds').textContent = stats.success;
                document.getElementById('failedBuilds').textContent = stats.failed;
                document.getElementById('buildingBuilds').textContent = stats.building;
            }
            
            renderBuilds(builds) {
                const container = document.getElementById('buildsContainer');
                
                if (Object.keys(builds).length === 0) {
                    container.innerHTML = `
                        <div class="loading">
                            <p>Сборки не найдены</p>
                        </div>
                    `;
                    return;
                }
                
                const buildItems = Object.entries(builds)
                    .sort(([,a], [,b]) => new Date(b.start_time) - new Date(a.start_time))
                    .map(([buildId, build]) => this.createBuildItem(buildId, build))
                    .join('');
                
                container.innerHTML = buildItems;
            }
            
            createBuildItem(buildId, build) {
                const statusClass = build.status;
                const statusText = {
                    'success': '✅ Успешно',
                    'failed': '❌ Неудачно',
                    'building': '🔄 В процессе',
                    'pending': '⏳ Ожидание'
                }[build.status] || '❓ Неизвестно';
                
                const startTime = new Date(build.start_time).toLocaleString('ru-RU');
                const duration = build.end_time 
                    ? this.calculateDuration(build.start_time, build.end_time)
                    : 'В процессе...';
                
                return `
                    <div class="build-item ${statusClass}">
                        <div class="build-status ${statusClass}"></div>
                        <div class="build-info">
                            <div class="build-repo">${build.repo_name || buildId}</div>
                            <div class="build-details">
                                ${statusText} • ${duration}
                                ${build.error ? `<br>Ошибка: ${build.error}` : ''}
                            </div>
                            <div class="build-time">Начато: ${startTime}</div>
                        </div>
                    </div>
                `;
            }
            
            calculateDuration(startTime, endTime) {
                const start = new Date(startTime);
                const end = new Date(endTime);
                const diff = Math.abs(end - start);
                
                const minutes = Math.floor(diff / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                
                return `${minutes}м ${seconds}с`;
            }
            
            showError(message) {
                const container = document.getElementById('buildsContainer');
                container.innerHTML = `
                    <div class="loading">
                        <p style="color: #e74c3c;">❌ ${message}</p>
                    </div>
                `;
            }
            
            startAutoRefresh() {
                setInterval(() => {
                    this.loadBuilds();
                }, this.refreshInterval);
            }
            
            async triggerBuild() {
                const repoUrl = prompt('Введите URL репозитория для сборки:');
                if (!repoUrl) return;
                
                try {
                    const response = await fetch(`${this.apiBaseUrl}/trigger-build`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            repo_url: repoUrl,
                            branch: 'master'
                        })
                    });
                    
                    if (response.ok) {
                        alert('Сборка запущена!');
                        this.loadBuilds();
                    } else {
                        throw new Error('Не удалось запустить сборку');
                    }
                } catch (error) {
                    alert(`Ошибка: ${error.message}`);
                }
            }
        }
        
        // Глобальные функции для кнопок
        let dashboard;
        
        function refreshBuilds() {
            dashboard.loadBuilds();
        }
        
        function triggerBuild() {
            dashboard.triggerBuild();
        }
        
        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            dashboard = new CICDDashboard();
        });
    </script>
</body>
</html>
